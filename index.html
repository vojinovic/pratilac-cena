<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratilac Cena — Polovni Automobili</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.5px;
  }

  header p {
    font-size: 0.9rem;
    color: #6b7280;
    margin-top: 4px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid #e5e7eb;
  }

  .card h2 {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #9ca3af;
    margin-bottom: 1rem;
  }

  .token-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"], input[type="password"] {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    font-size: 0.9rem;
    color: #1a1a2e;
    background: #f9fafb;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="password"]:focus {
    border-color: #6366f1;
    background: #fff;
  }

  button {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: #6366f1;
    color: #fff;
  }

  .btn-primary:hover { background: #4f46e5; }
  .btn-primary:disabled { background: #c7c8f0; cursor: not-allowed; }

  .btn-danger {
    background: #fee2e2;
    color: #dc2626;
    padding: 6px 12px;
    font-size: 0.8rem;
    border-radius: 8px;
  }

  .btn-danger:hover { background: #fecaca; }

  .btn-ghost {
    background: #f3f4f6;
    color: #6b7280;
    padding: 6px 12px;
    font-size: 0.8rem;
    border-radius: 8px;
  }

  .btn-ghost:hover { background: #e5e7eb; }

  .url-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .oglas-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .oglas-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .oglas-icon {
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .oglas-url {
    flex: 1;
    font-size: 0.82rem;
    color: #374151;
    word-break: break-all;
    line-height: 1.4;
  }

  .oglas-url a {
    color: #6366f1;
    text-decoration: none;
  }

  .oglas-url a:hover { text-decoration: underline; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 500;
    margin-top: 1rem;
  }

  .status-bar.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  .status-bar.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .status-bar.info { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  .status-bar.loading { background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: #9ca3af;
    font-size: 0.9rem;
  }

  .save-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 1rem;
  }

  .token-help {
    font-size: 0.8rem;
    color: #9ca3af;
    margin-top: 8px;
    line-height: 1.5;
  }

  .token-help a {
    color: #6366f1;
    text-decoration: none;
  }

  .token-help a:hover { text-decoration: underline; }

  .badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    background: #ede9fe;
    color: #6d28d9;
    flex-shrink: 0;
  }

  #section-oglasi { display: none; }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🚗 Pratilac cena</h1>
    <p>Upravljaj oglasima koje pratiš na Polovni automobili</p>
  </header>

  <!-- Token sekcija -->
  <div class="card" id="section-token">
    <h2>GitHub pristup</h2>
    <div class="token-row">
      <input type="password" id="input-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <button class="btn-primary" onclick="conectuj()">Poveži</button>
    </div>
    <p class="token-help">
      Token ti treba da bi aplikacija mogla da menja fajl na GitHubu.<br>
      Napravi ga na <a href="https://github.com/settings/tokens/new?scopes=repo&description=PratilacCena" target="_blank">github.com/settings/tokens</a>
      — čekiraj samo <strong>repo</strong> i klikni Generate.
    </p>
    <div id="token-status"></div>
  </div>

  <!-- Oglasi sekcija -->
  <div class="card" id="section-oglasi">
    <h2>Praćeni oglasi <span class="badge" id="badge-count">0</span></h2>

    <div class="url-input-row">
      <input type="text" id="input-url" placeholder="https://www.polovniautomobili.com/auto-oglasi/..." />
      <button class="btn-primary" onclick="dodajOglas()">Dodaj</button>
    </div>

    <div class="oglas-list" id="oglas-list">
      <div class="empty-state">Učitavanje...</div>
    </div>

    <div class="save-row">
      <button class="btn-primary" id="btn-sacuvaj" onclick="sacuvaj()" disabled>Sačuvaj izmene</button>
    </div>
    <div id="save-status"></div>
  </div>
</div>

<script>
const REPO_OWNER = 'vojinovic';
const REPO_NAME  = 'pratilac-cena';
const FILE_PATH  = 'pratilac_cena.py';

let token = localStorage.getItem('gh_token') || '';
let oglasi = [];
let originalSha = '';
let izmenjeno = false;

function setStatus(elId, tip, poruka) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = poruka
    ? `<div class="status-bar ${tip}">${poruka}</div>`
    : '';
}

async function conectuj() {
  token = document.getElementById('input-token').value.trim();
  if (!token) return;

  setStatus('token-status', 'loading', '<span class="spinner"></span> Proveravam token...');

  try {
    const resp = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (!resp.ok) {
      setStatus('token-status', 'error', '❌ Nevažeći token ili nema pristupa repozitorijumu.');
      return;
    }

    localStorage.setItem('gh_token', token);
    setStatus('token-status', 'success', '✅ Povezano!');
    document.getElementById('section-oglasi').style.display = 'block';
    await ucitajOglase();

  } catch(e) {
    setStatus('token-status', 'error', '❌ Greška: ' + e.message);
  }
}

async function ucitajOglase() {
  setStatus('save-status', 'loading', '<span class="spinner"></span> Učitavam oglase iz GitHuba...');

  try {
    const resp = await fetch(
      `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );

    if (!resp.ok) throw new Error('Ne mogu da učitam fajl.');

    const data = await resp.json();
    originalSha = data.sha;
    const content = atob(data.content.replace(/\n/g, ''));

    oglasi = parsujOglase(content);
    renderujListu();
    setStatus('save-status', '', '');

  } catch(e) {
    setStatus('save-status', 'error', '❌ ' + e.message);
  }
}

function parsujOglase(pythonKod) {
  const match = pythonKod.match(/OGLASI\s*=\s*\[([\s\S]*?)\]/);
  if (!match) return [];
  const blok = match[1];
  const urls = [];
  const re = /["'](https?:\/\/[^"']+)["']/g;
  let m;
  while ((m = re.exec(blok)) !== null) {
    urls.push(m[1]);
  }
  return urls;
}

function renderujListu() {
  const lista = document.getElementById('oglas-list');
  document.getElementById('badge-count').textContent = oglasi.length;

  if (oglasi.length === 0) {
    lista.innerHTML = '<div class="empty-state">Nema praćenih oglasa. Dodaj prvi URL gore.</div>';
    return;
  }

  lista.innerHTML = oglasi.map((url, i) => {
    const kratakUrl = url.replace('https://www.polovniautomobili.com/auto-oglasi/', '').split('?')[0];
    return `
      <div class="oglas-item">
        <span class="oglas-icon">🚗</span>
        <div class="oglas-url">
          <a href="${url}" target="_blank">${kratakUrl}</a>
        </div>
        <button class="btn-danger" onclick="ukloniOglas(${i})">Ukloni</button>
      </div>
    `;
  }).join('');
}

function dodajOglas() {
  const input = document.getElementById('input-url');
  const url = input.value.trim();

  if (!url.includes('polovniautomobili.com')) {
    setStatus('save-status', 'error', '❌ URL mora biti sa polovniautomobili.com');
    return;
  }

  if (oglasi.includes(url)) {
    setStatus('save-status', 'error', '❌ Taj oglas već pratiš.');
    return;
  }

  oglasi.push(url);
  input.value = '';
  izmenjeno = true;
  document.getElementById('btn-sacuvaj').disabled = false;
  renderujListu();
  setStatus('save-status', 'info', 'ℹ️ Imas nesačuvane izmene. Klikni Sačuvaj.');
}

function ukloniOglas(i) {
  oglasi.splice(i, 1);
  izmenjeno = true;
  document.getElementById('btn-sacuvaj').disabled = false;
  renderujListu();
  setStatus('save-status', 'info', 'ℹ️ Imas nesačuvane izmene. Klikni Sačuvaj.');
}

async function sacuvaj() {
  setStatus('save-status', 'loading', '<span class="spinner"></span> Čitam trenutni fajl...');

  try {
    const respGet = await fetch(
      `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );

    if (!respGet.ok) throw new Error('Ne mogu da pročitam fajl.');

    const dataGet = await respGet.json();
    originalSha = dataGet.sha;
    const originalContent = atob(dataGet.content.replace(/\n/g, ''));

    const urlsString = oglasi.length > 0
      ? oglasi.map(u => `    "${u}",`).join('\n')
      : '    # Nema oglasa';

    const noviSadrzaj = originalContent.replace(
      /OGLASI\s*=\s*\[[\s\S]*?\]/,
      `OGLASI = [\n${urlsString}\n]`
    );

    setStatus('save-status', 'loading', '<span class="spinner"></span> Čuvam na GitHub...');

    const respPut = await fetch(
      `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
      {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: `Ažurirani oglasi (${oglasi.length} ukupno)`,
          content: btoa(unescape(encodeURIComponent(noviSadrzaj))),
          sha: originalSha
        })
      }
    );

    if (!respPut.ok) {
      const err = await respPut.json();
      throw new Error(err.message || 'Greška pri čuvanju.');
    }

    const dataNew = await respPut.json();
    originalSha = dataNew.content.sha;
    izmenjeno = false;
    document.getElementById('btn-sacuvaj').disabled = true;
    setStatus('save-status', 'success', `✅ Sačuvano! Pratiš ${oglasi.length} oglas(a). GitHub će ih proveriti pri sledećem pokretanju.`);

  } catch(e) {
    setStatus('save-status', 'error', '❌ ' + e.message);
  }
}

// Auto-login ako token postoji
if (token) {
  document.getElementById('input-token').value = token;
  conectuj();
}
</script>
</body>
</html>
